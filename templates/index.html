<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Churn Prediction</title>

    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    /* NEW MODERN GRADIENT BACKGROUND */
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* MAIN CARD */
.container {
    background: linear-gradient(135deg, #ffffff, #f3e8ff, #e0f2fe);
    padding: 12px;
    border-radius: 14px;
    width: 650px;
    height: 520px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;

    border: 1px solid rgba(147, 51, 234, 0.2);
}

/* TITLE */
h1 {
    text-align: center;
    margin-bottom: 5px;
    font-size: 18px;
    color: #1f2937;
}

/* SUBTITLE */
h5 {
    width: 100%;
    text-align: center;
    margin-bottom: 25px;
    color: #6b7280;
}

/* FORM GRID */
form {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    overflow: hidden;
}

/* FIELD BOX */
.form-group {
    display: flex;
    flex-direction: column;
}

/* LABEL */
label {
    font-size: 10px;
    margin-bottom: 3px;
    color: #374151;
}

/* INPUTS */
select, input {
    padding: 7px;
    font-size: 11px;
    border-radius: 6px;
    border: 1px solid #d1d5db;
    background: #f9fafb;
    transition: 0.2s;
}

/* FOCUS EFFECT */
select:focus, input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 5px rgba(59,130,246,0.4);
}

/* FULL WIDTH */
.full-width {
    grid-column: span 4;
}

/* BUTTON (NEW GRADIENT) */
button {
    grid-column: span 4;
    padding: 9px;

    background: linear-gradient(135deg, #3b82f6, #6366f1, #06b6d4);
    color: white;

    border: none;
    border-radius: 8px;

    font-size: 13px;
    font-weight: 600;
    cursor: pointer;

    transition: 0.3s;
}

button:hover {
    transform: scale(1.02);
    box-shadow: 0 10px 20px rgba(59,130,246,0.3);
}

/* RESULT */
.result {
    text-align: center;
    font-size: 14px;
    font-weight: bold;
    margin-top: 6px;
    color: #111827;
}
</style>

</head>

<body>

<div class="container">
    <h1>AI-Powered Customer Retention Prediction System</h1>
    <h5>Using Machine Learning</h5>

    <form action="/predict" method="post">

        <div class="form-group">
            <label>Gender</label>
            <select name="gender">
                <option disabled selected>Select Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Senior Citizen</label>
            <select name="SeniorCitizen">
                <option disabled selected>Select Option</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Partner</label>
            <select name="Partner">
                <option disabled selected>Select Option</option>
                <option>Yes</option>
                <option>No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Dependents</label>
            <select name="Dependents">
                <option disabled selected>Select Option</option>
                <option>Yes</option>
                <option>No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Phone Service</label>
            <select name="PhoneService">
                <option disabled selected>Select Option</option>
                <option>Yes</option>
                <option>No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Multiple Lines</label>
            <select name="MultipleLines">
                <option disabled selected>Select Option</option>
                <option>No</option>
                <option>Yes</option>
                <option>No phone service</option>
            </select>
        </div>

        <div class="form-group">
            <label>Internet Service</label>
            <select name="InternetService">
                <option disabled selected>Select Type</option>
                <option>DSL</option>
                <option>Fiber optic</option>
                <option>No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Online Security</label>
            <select name="OnlineSecurity">
                <option disabled selected>Select Option</option>
                <option>Yes</option>
                <option>No</option>
                <option>No internet service</option>
            </select>
        </div>

        <div class="form-group">
            <label>Online Backup</label>
            <select name="OnlineBackup">
                <option disabled selected>Select Option</option>
                <option>Yes</option>
                <option>No</option>
                <option>No internet service</option>
            </select>
        </div>

        <div class="form-group">
            <label>Device Protection</label>
            <select name="DeviceProtection">
                <option disabled selected>Select Option</option>
                <option>Yes</option>
                <option>No</option>
                <option>No internet service</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tech Support</label>
            <select name="TechSupport">
                <option disabled selected>Select Option</option>
                <option>Yes</option>
                <option>No</option>
                <option>No internet service</option>
            </select>
        </div>

        <div class="form-group">
            <label>Streaming TV</label>
            <select name="StreamingTV">
                <option disabled selected>Select Option</option>
                <option>Yes</option>
                <option>No</option>
                <option>No internet service</option>
            </select>
        </div>

        <div class="form-group">
            <label>Streaming Movies</label>
            <select name="StreamingMovies">
                <option disabled selected>Select Option</option>
                <option>Yes</option>
                <option>No</option>
                <option>No internet service</option>
            </select>
        </div>

        <div class="form-group">
            <label>Contract Type</label>
            <select name="Contract">
                <option disabled selected>Select Contract</option>
                <option>Month-to-month</option>
                <option>One year</option>
                <option>Two year</option>
            </select>
        </div>

        <div class="form-group">
            <label>Paperless Billing</label>
            <select name="PaperlessBilling">
                <option disabled selected>Select Option</option>
                <option>Yes</option>
                <option>No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Payment Method</label>
            <select name="PaymentMethod">
                <option disabled selected>Select Method</option>
                <option>Electronic check</option>
                <option>Mailed check</option>
                <option>Bank transfer (automatic)</option>
                <option>Credit card (automatic)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tenure (Months)</label>
            <input type="number" name="tenure" placeholder="e.g. 12" required>
        </div>

        <div class="form-group">
            <label>Monthly Charges</label>
            <input type="number" step="0.01" name="MonthlyCharges" placeholder="e.g. 70.50" required>
        </div>

        <div class="form-group full-width">
            <label>Total Charges</label>
            <input type="number" step="0.01" name="TotalCharges" placeholder="e.g. 1500.75" required>
        </div>

        <button type="submit">🔍 Predict Churn</button>

    </form>

    <div class="result">
        {% if prediction_text %}
            {{ prediction_text }}
        {% endif %}
    </div>

</div>

</body>
</html>
